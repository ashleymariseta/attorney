services:
  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             gunicorn attorney.asgi:application
             --worker-class uvicorn.workers.UvicornWorker
             --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A attorney worker -l info
    volumes:
      - .:/app
      - media_data:/app/media
    env_file:
      - .env
    depends_on:
      - db
      - redis

  beat:
    build: .
    command: celery -A attorney beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: attorney
      POSTGRES_USER: attorney
      POSTGRES_PASSWORD: attorney
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  media_data:
